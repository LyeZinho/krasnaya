version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-levelbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-levelbot123}
      POSTGRES_DB: ${DB_NAME:-levelbot}
    ports:
      - "11900:5432"
    volumes:
      - krasnaya_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - krasnaya_redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-levelbot}:${DB_PASSWORD:-levelbot123}@postgres:5432/${DB_NAME:-levelbot}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:3000"
    environment:
      - ORIGIN=${ORIGIN:-http://localhost:5173}
    depends_on:
      - backend

volumes:
  krasnaya_pg_data:
  krasnaya_redis_data:
